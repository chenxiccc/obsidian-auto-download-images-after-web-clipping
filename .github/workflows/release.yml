# 仅当 manifest.json 变更推送到 main 时发布 Release（即版本号变化时）
# Only publish a GitHub Release when manifest.json changes are pushed to main (i.e., version bumps)

name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 检出代码 | Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 Node.js | Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 安装依赖并编译 TypeScript | Install dependencies and compile TypeScript
      - name: Install dependencies and build
        run: npm install --legacy-peer-deps && npm run build

      # 从 manifest.json 读取版本号 | Read version from manifest.json
      - name: Read manifest metadata
        id: meta
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      # 为构建产物生成来源证明，确保用户可加密验证文件来自此仓库
      # Generate provenance attestation for build artifacts so users can cryptographically verify origin
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json

      # 若同名 Release/Tag 已存在则先删除，确保内容始终是最新的
      # Delete existing release and tag if present, so the latest content always wins
      - name: Delete existing release if present
        run: gh release delete "${{ steps.meta.outputs.version }}" --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 创建 Release 并上传资源文件 | Create release and upload assets
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            main.js
            manifest.json
